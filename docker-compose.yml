services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      HOST: 0.0.0.0
      PORT: 8000
      RELOAD: "false"

    volumes:
      - ./uploaded_media:/app/uploaded_media
      - ./test.db:/app/test.db

    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend

    ports:
      - "8501:8501"

    environment:
      API_BASE_URL: http://backend:8000

    depends_on:
      - backend

    restart: unless-stopped